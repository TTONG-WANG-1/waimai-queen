<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>外卖女王</title>
    <style>
        body { font-family: Arial, sans-serif; background: linear-gradient(135deg, #667eea, #764ba2, #f093fb); min-height: 100vh; padding: 20px; margin: 0; }
        .container { max-width: 900px; margin: 0 auto; }
        .header { text-align: center; color: white; margin-bottom: 30px; }
        .header h1 { font-size: 3em; margin-bottom: 10px; }
        .card { background: white; border-radius: 16px; padding: 24px; margin-bottom: 20px; box-shadow: 0 8px 32px rgba(0,0,0,0.2); }
        .card-title { font-size: 1.3em; font-weight: 600; margin-bottom: 16px; }
        .selector { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
        .btn { padding: 10px 20px; border: 2px solid #2563EB; border-radius: 20px; background: white; color: #2563EB; cursor: pointer; transition: all 0.3s; }
        .btn:hover { transform: scale(1.05); }
        .btn.active { background: #2563EB; color: white; }
        .btn-cta { border-color: #F97316; color: #F97316; }
        .btn-cta.active { background: #F97316; color: white; }
        .input-group { display: flex; gap: 12px; margin-top: 12px; }
        .input-group input { flex: 1; padding: 12px; border: 2px solid #2563EB; border-radius: 12px; font-size: 1em; }
        .input-group button { padding: 12px 24px; background: #F97316; color: white; border: none; border-radius: 12px; cursor: pointer; }
        .location-info { padding: 12px; background: #f0f4ff; border-radius: 12px; margin-top: 16px; }
        .shop-item { border: 2px solid #f0f0f0; border-radius: 12px; padding: 20px; margin-bottom: 16px; transition: all 0.3s; }
        .shop-item:hover { border-color: #2563EB; transform: translateX(8px); box-shadow: 0 4px 16px rgba(0,0,0,0.1); }
        .shop-header { display: flex; justify-content: space-between; align-items: start; margin-bottom: 12px; }
        .shop-name { font-size: 1.2em; font-weight: 600; }
        .shop-rating { padding: 4px 12px; background: linear-gradient(135deg, #FFD700, #FFA500); border-radius: 12px; font-weight: 700; color: white; }
        .shop-info { display: flex; gap: 12px; margin-bottom: 12px; flex-wrap: wrap; }
        .tag { padding: 4px 12px; background: #f0f4ff; border-radius: 12px; }
        .recommend { background: #fff5f0; padding: 12px; border-radius: 8px; border-left: 3px solid #F97316; margin-bottom: 12px; }
        .source { display: flex; justify-content: space-between; align-items: center; }
        .badge { padding: 4px 12px; background: #ff2442; color: white; border-radius: 12px; }
        .link { color: #2563EB; text-decoration: none; font-weight: 600; }
        .loading, .empty { text-align: center; padding: 40px; }
        .footer { text-align: center; color: white; margin-top: 30px; padding: 20px; background: rgba(255,255,255,0.2); border-radius: 16px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>👑 外卖女王</h1>
            <p>深圳外卖推荐助手</p>
        </div>
        <div class="card">
            <div class="card-title">📍 精准定位</div>
            <div><strong>1️⃣ 选区域：</strong></div>
            <div class="selector" id="areaSel"></div>
            <div><strong>2️⃣ 定位方式：</strong></div>
            <div class="selector">
                <button class="btn btn-cta active" onclick="setMode('station')">🚇 地铁站</button>
                <button class="btn btn-cta" onclick="setMode('custom')">✏️ 手动输入</button>
            </div>
            <div id="stationDiv">
                <div><strong>3️⃣ 选地铁站：</strong></div>
                <div class="selector" id="stationSel"></div>
            </div>
            <div id="customDiv" style="display:none;">
                <div><strong>3️⃣ 输入地址：</strong></div>
                <div class="input-group">
                    <input id="customAddr" placeholder="例如：南山区储能大厦">
                    <button onclick="confirmAddr()">✅ 确认</button>
                </div>
            </div>
            <div class="location-info">📍 当前：<strong id="currLoc">南山区 · 科技园</strong></div>
        </div>
        <div class="card">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
                <span style="font-size:1.3em;font-weight:600;">🍱 推荐店铺</span>
                <button class="btn btn-cta" onclick="load()">🔄 刷新</button>
            </div>
            <div id="shops"></div>
        </div>
        <div class="footer">
            <p>数据来源：小红书 | 大众点评</p>
            <p>更新：<span id="updTime">-</span></p>
        </div>
    </div>
    <script>
        // 深圳区域和地铁站
        const locationData={
            "南山区":{"stations":["科技园","海岸城","深圳湾","前海","西丽","南油","蛇口","桃园"]},
            "福田区":{"stations":["CBD","车公庙","华强北","香蜜湖","岗厦","梅林","福田口岸"]},
            "罗湖区":{"stations":["国贸","东门","万象城","湖贝","笋岗","黄贝岭"]},
            "宝安区":{"stations":["宝安中心","西乡","福永","沙井","新安","坪洲"]},
            "龙华区":{"stations":["深圳北站","龙华中心","民治","观澜","白石龙"]},
            "龙岗区":{"stations":["大运","龙岗中心","布吉","坂田","横岗"]}
        };
        
        // 店铺数据（直接嵌入，避免加载失败）
        const shopData={
            "lastUpdate": "2026-03-30T18:30:00+08:00",
            "shops": [
                {"id":"1","name":"木屋烧烤","area":"南山区","subArea":"科技园","rating":"4.8","price":"人均 60 元","recommendations":["烤羊肉串","烤茄子","蒜蓉生蚝"],"source":"小红书","link":"https://www.xiaohongshu.com/"},
                {"id":"2","name":"点都德","area":"福田区","subArea":"CBD","rating":"4.6","price":"人均 80 元","recommendations":["虾饺","红米肠","流沙包"],"source":"小红书","link":"https://www.xiaohongshu.com/"},
                {"id":"3","name":"探鱼","area":"南山区","subArea":"海岸城","rating":"4.5","price":"人均 70 元","recommendations":["清江鱼","烤牛蛙","红糖糍粑"],"source":"小红书","link":"https://www.xiaohongshu.com/"},
                {"id":"4","name":"太二酸菜鱼","area":"南山区","subArea":"科技园","rating":"4.7","price":"人均 75 元","recommendations":["酸菜鱼","小吃拼盘","五常米饭"],"source":"小红书","link":"https://www.xiaohongshu.com/"},
                {"id":"5","name":"陶陶居","area":"福田区","subArea":"车公庙","rating":"4.6","price":"人均 90 元","recommendations":["酥皮水牛奶菠萝包","大虾饺","冰镇咕噜肉"],"source":"小红书","link":"https://www.xiaohongshu.com/"}
            ]
        };
        
        let area="南山区",loc="科技园",mode="station";
        
        function init(){
            const as=document.getElementById("areaSel");
            Object.keys(locationData).forEach(a=>{
                const b=document.createElement("button");
                b.className="btn"+(a===area?" active":"");
                b.textContent=a;
                b.onclick=()=>selArea(a);
                as.appendChild(b);
            });
            updStation();
            load();
        }
        
        function selArea(a){
            area=a;loc=locationData[a].stations[0];
            document.querySelectorAll("#areaSel .btn").forEach(b=>b.classList.toggle("active",b.textContent===a));
            updStation();
            updLoc();
            load();
        }
        
        function updStation(){
            const ss=document.getElementById("stationSel");
            ss.innerHTML="";
            locationData[area].stations.forEach(s=>{
                const b=document.createElement("button");
                b.className="btn btn-cta"+(s===loc?" active":"");
                b.textContent=s;
                b.onclick=()=>{loc=s;document.querySelectorAll("#stationSel .btn").forEach(x=>x.classList.toggle("active",x.textContent===s));updLoc();load();};
                ss.appendChild(b);
            });
        }
        
        function setMode(m){
            mode=m;
            document.getElementById("stationDiv").style.display=m==="station"?"block":"none";
            document.getElementById("customDiv").style.display=m==="custom"?"block":"none";
            document.querySelectorAll(".selector:nth-of-type(2) .btn").forEach((b,i)=>b.classList.toggle("active",i===(m==="station"?0:1)));
        }
        
        function confirmAddr(){
            const addr=document.getElementById("customAddr").value;
            if(addr){loc=addr;updLoc();load();}
        }
        
        function updLoc(){document.getElementById("currLoc").textContent=area+" · "+loc;}
        
        function load(){
            const el=document.getElementById("shops");
            el.innerHTML='<div class="loading">🍜 正在寻找美食...</div>';
            
            // 使用嵌入的数据，不依赖网络请求
            setTimeout(()=>{
                const d=shopData;
                const shops=d.shops.filter(s=>s.area===area&&(s.subArea===loc||loc.includes(s.subArea)));
                
                if(shops.length===0){
                    el.innerHTML='<div class="empty">😋 暂无推荐，换个位置试试～</div>';
                    return;
                }
                
                el.innerHTML=shops.map(s=>`
                    <div class="shop-item">
                        <div class="shop-header"><div class="shop-name">${s.name}</div><div class="shop-rating">⭐${s.rating}</div></div>
                        <div class="shop-info"><span class="tag">💰${s.price}</span><span class="tag">📍${s.area}·${s.subArea}</span></div>
                        <div class="recommend">🌟推荐：${s.recommendations.join("、")}</div>
                        <div class="source"><span class="badge">${s.source}</span><a href="${s.link}" target="_blank" class="link">查看→</a></div>
                    </div>
                `).join("");
                
                document.getElementById("updTime").textContent=new Date(d.lastUpdate).toLocaleString("zh-CN");
            }, 300);
        }
        
        init();
    </script>
</body>
</html>
