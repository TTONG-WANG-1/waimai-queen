<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>外卖女王 v2.0 - 可编辑删除</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@400;600;700;800&family=Varela+Round&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{--primary:#FBBF24;--primary-dark:#F59E0B;--primary-light:#FCD34D;--secondary:#FEF3C7;--accent:#F97316;--bg:#FFFBEB;--bg-card:#FFFFFF;--text:#1F2937;--text-light:#6B7280;--border:#FDE68A;--shadow:0 4px 12px rgba(251,191,36,0.15);--radius:16px;--radius-lg:20px}
        body{font-family:'Nunito Sans',-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;background:linear-gradient(180deg,var(--bg) 0%,#FEF9E7 100%);min-height:100vh;padding:20px;color:var(--text)}
        .container{max-width:1000px;margin:0 auto}
        .header{text-align:center;margin-bottom:24px;padding:20px}
        .header h1{font-family:'Varela Round',sans-serif;font-size:2.5em;background:linear-gradient(135deg,var(--primary-dark),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px}
        .header p{font-size:1em;color:var(--text-light);font-weight:600}
        .card{background:var(--bg-card);border-radius:var(--radius-lg);padding:20px;margin-bottom:16px;box-shadow:var(--shadow);border:2px solid var(--border)}
        .card-title{font-size:1.3em;font-weight:800;margin-bottom:16px;color:var(--primary-dark)}
        
        /* 区域选择 */
        .district-selector{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:16px}
        .district-btn{padding:14px 20px;background:white;border:2px solid var(--primary);border-radius:var(--radius);color:var(--primary-dark);cursor:pointer;font-size:1em;font-weight:700;transition:all 0.2s}
        .district-btn:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(251,191,36,0.3)}
        .district-btn.active{background:linear-gradient(135deg,var(--primary),var(--primary-light));color:white;border-color:var(--primary-dark)}
        
        /* 定位信息 */
        .location-bar{display:flex;gap:12px;align-items:center;margin-bottom:16px;padding:12px;background:linear-gradient(135deg,var(--secondary),#FEF9C3);border-radius:var(--radius);border:2px solid var(--primary-light)}
        .location-btn{padding:10px 18px;background:linear-gradient(135deg,var(--primary),var(--primary-light));color:white;border:none;border-radius:12px;cursor:pointer;font-size:0.9em;font-weight:700;white-space:nowrap}
        .location-text{flex:1;font-size:0.95em;color:#92400E}
        .location-text strong{color:var(--accent);font-weight:800}
        
        /* 店铺列表 */
        .shops-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;padding-bottom:12px;border-bottom:2px dashed var(--border)}
        .shops-count{font-size:1.1em;font-weight:700;color:var(--primary-dark)}
        .shop-item{border:2px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px;transition:all 0.3s;background:linear-gradient(135deg,#FFFEFB,#FFFBF0)}
        .shop-item:hover{border-color:var(--primary-dark);transform:translateX(4px);box-shadow:0 6px 16px rgba(251,191,36,0.25)}
        .shop-header{display:flex;justify-content:space-between;align-items:start;margin-bottom:10px;flex-wrap:wrap;gap:8px}
        .shop-name{font-size:1.25em;font-weight:800;color:var(--text)}
        .shop-rating{padding:5px 12px;background:linear-gradient(135deg,var(--primary),var(--accent));border-radius:12px;font-weight:800;color:white;font-size:0.9em}
        .shop-info{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap}
        .tag{padding:5px 12px;background:var(--secondary);border-radius:12px;font-size:0.85em;color:var(--primary-dark);font-weight:600;border:1px solid var(--primary-light)}
        .tag.distance{background:linear-gradient(135deg,#FEF3C7,#FDE68A);color:#92400E}
        .tag.xhs{background:linear-gradient(135deg,#ff2442,#ff6b6b);color:white;border:none}.tag.active{background:#FBBF24;color:white}
        .recommend{background:linear-gradient(135deg,#FFFBEB,#FEF3C7);padding:10px;border-radius:10px;border-left:3px solid var(--accent);margin-bottom:10px;font-size:0.95em}
        .recommend strong{color:var(--accent);font-weight:800}
        .source{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
        .badge{padding:5px 12px;background:linear-gradient(135deg,#F97316,#FB923C);color:white;border-radius:12px;font-size:0.8em;font-weight:700}
        .badge.dianping{background:linear-gradient(135deg,#FF6B35,#F97316)}
        .shop-link{color:var(--primary-dark);text-decoration:none;font-weight:700;padding:6px 14px;background:var(--secondary);border-radius:10px;transition:all 0.2s;border:2px solid var(--primary-light);font-size:0.9em}
        .shop-link:hover{background:var(--primary);color:white}
        
        .loading,.empty{text-align:center;padding:50px 20px;color:var(--text-light)}
        .footer{text-align:center;color:var(--text-light);margin-top:20px;padding:16px;background:linear-gradient(135deg,var(--bg-card),var(--bg));border-radius:var(--radius)}
        
        @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.8;transform:scale(1.05)}}
        @media(max-width:600px){.header h1{font-size:2em}.district-selector{grid-template-columns:repeat(2,1fr)}.shop-name{font-size:1.1em}}
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>👑 外卖女王</h1>
            <p>深圳外卖推荐助手 · 按区推荐</p>
            <button onclick="toggleQuickAdd()" style="margin-top:12px;padding:10px 20px;background:linear-gradient(135deg,#FBBF24,#F59E0B);color:white;border:none;border-radius:12px;cursor:pointer;font-size:0.95em;font-weight:700;box-shadow:0 4px 12px rgba(251,191,36,0.3);transition:all 0.2s">➕ 快速添加店铺</button>
        </div>
        
        
        <!-- 快速添加面板 -->
        <div class="card" id="quickAddCard" style="display:none;">
            <div class="card-title" style="display:flex;justify-content:space-between;align-items:center">
                <span>➕ 快速添加店铺</span>
                <button onclick="toggleQuickAdd()" style="background:none;border:none;font-size:1.5em;cursor:pointer;color:#6B7280">&times;</button>
            </div>
            <form id="quickAddForm" style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
                <div style="grid-column:span 2"><input type="text" id="qaName" required placeholder="店铺名称 *" style="width:100%;padding:10px;border:2px solid #FDE68A;border-radius:10px;font-size:1em"></div>
                <select id="qaArea" required style="padding:10px;border:2px solid #FDE68A;border-radius:10px"><option value="">区域 *</option><option value="南山">南山区</option><option value="福田">福田区</option><option value="宝安">宝安区</option></select>
                <input type="text" id="qaSubArea" placeholder="位置 (如：科技园)" style="padding:10px;border:2px solid #FDE68A;border-radius:10px">
                <input type="text" id="qaPrice" placeholder="价格 (如：45 元)" style="padding:10px;border:2px solid #FDE68A;border-radius:10px">
                <select id="qaRating" style="padding:10px;border:2px solid #FDE68A;border-radius:10px"><option value="4.5">4.5⭐</option><option value="4.6">4.6⭐</option><option value="4.7">4.7⭐</option><option value="4.8">4.8⭐</option><option value="4.9">4.9⭐</option><option value="5.0">5.0⭐</option></select>
                <div style="grid-column:span 2"><textarea id="qaRecs" required placeholder="推荐菜 * (用顿号分隔)" style="width:100%;padding:10px;border:2px solid #FDE68A;border-radius:10px;min-height:60px;font-size:1em;font-family:inherit"></textarea></div>
                <select id="qaSource" style="padding:10px;border:2px solid #FDE68A;border-radius:10px"><option value="小红书">小红书</option><option value="大众点评">大众点评</option><option value="朋友推荐">朋友推荐</option><option value="自己吃过">自己吃过</option></select>
                <input type="url" id="qaLink" placeholder="来源链接 (可选)" style="padding:10px;border:2px solid #FDE68A;border-radius:10px">
                <div style="grid-column:span 2;display:flex;gap:8px;flex-wrap:wrap" id="qaTags"><span class="tag" style="cursor:pointer" onclick="toggleQaTag(this)">快乐朵鹅推荐</span><span class="tag" style="cursor:pointer" onclick="toggleQaTag(this)">高分宝藏</span><span class="tag" style="cursor:pointer" onclick="toggleQaTag(this)">科技园美食</span><span class="tag" style="cursor:pointer" onclick="toggleQaTag(this)">海岸城美食</span><span class="tag" style="cursor:pointer" onclick="toggleQaTag(this)">车公庙美食</span><span class="tag" style="cursor:pointer" onclick="toggleQaTag(this)">平价食堂</span><span class="tag" style="cursor:pointer" onclick="toggleQaTag(this)">适合聚餐</span><span class="tag" style="cursor:pointer" onclick="toggleQaTag(this)">一人食</span><span class="tag" style="cursor:pointer" onclick="toggleQaTag(this)">可堂食可外卖</span><span class="tag" style="cursor:pointer" onclick="toggleQaTag(this)">新店开业</span></div>
                <div style="grid-column:span 2"><input type="text" id="qaTagInput" placeholder="输入标签后按回车 (如：科技园美食)" style="width:100%;padding:10px;border:2px solid #FDE68A;border-radius:10px;font-size:1em"></div>
                <button type="submit" class="location-btn" style="grid-column:span 2;border:none;cursor:pointer">➕ 立即添加</button>
            </form>
        </div>

<div class="card">
            <div class="card-title">📍 选择区域</div>
            <div class="district-selector" id="districtSel"></div>
            <div class="location-bar">
                <button class="location-btn" onclick="getLocation()" id="locateBtn">📍 定位</button>
                <div class="location-text">
                    📍 当前位置：<strong id="currLoc">点击定位</strong>
                    <span style="margin-left:12px;color:#666">已选择：<strong id="currDistrict" style="color:var(--accent)">-</strong>区</span>
                </div>
            </div>
        </div>
        
        <div class="card">
            <div class="shops-header">
                <span class="shops-count" id="shopsCount">🍱 推荐店铺</span>
                <span style="font-size:0.9em;color:var(--text-light)">📊 全部展示</span>
            </div>
            <div id="shops"></div>
        </div>
        
        
        <!-- 编辑模态框 -->
        <div id="editModal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:1000;justify-content:center;align-items:center">
            <div style="background:white;border-radius:16px;padding:24px;max-width:600px;width:90%;max-height:90vh;overflow-y:auto">
                <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;padding-bottom:12px;border-bottom:2px solid #FDE68A">
                    <h2 style="color:#F59E0B;margin:0">✏️ 编辑店铺</h2>
                    <button onclick="closeEditModal()" style="background:none;border:none;font-size:1.5em;cursor:pointer;color:#6B7280">&times;</button>
                </div>
                <form id="editShopForm" style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
                    <input type="hidden" id="editShopId">
                    <div style="grid-column:span 2"><label style="font-weight:700;display:block;margin-bottom:6px">店铺名称 *</label><input type="text" id="editName" required style="width:100%;padding:10px;border:2px solid #FDE68A;border-radius:10px;font-size:1em"></div>
                    <div><label style="font-weight:700;display:block;margin-bottom:6px">区域 *</label><select id="editArea" required style="width:100%;padding:10px;border:2px solid #FDE68A;border-radius:10px"><option value="南山">南山区</option><option value="福田">福田区</option><option value="宝安">宝安区</option><option value="罗湖">罗湖区</option><option value="龙华">龙华区</option><option value="龙岗">龙岗区</option></select></div>
                    <div><label style="font-weight:700;display:block;margin-bottom:6px">位置</label><input type="text" id="editSubArea" style="width:100%;padding:10px;border:2px solid #FDE68A;border-radius:10px"></div>
                    <div><label style="font-weight:700;display:block;margin-bottom:6px">价格</label><input type="text" id="editPrice" style="width:100%;padding:10px;border:2px solid #FDE68A;border-radius:10px"></div>
                    <div><label style="font-weight:700;display:block;margin-bottom:6px">评分</label><select id="editRating" style="width:100%;padding:10px;border:2px solid #FDE68A;border-radius:10px"><option value="4.5">4.5⭐</option><option value="4.6">4.6⭐</option><option value="4.7">4.7⭐</option><option value="4.8">4.8⭐</option><option value="4.9">4.9⭐</option><option value="5.0">5.0⭐</option></select></div>
                    <div style="grid-column:span 2"><label style="font-weight:700;display:block;margin-bottom:6px">推荐菜 *</label><textarea id="editRecs" required style="width:100%;padding:10px;border:2px solid #FDE68A;border-radius:10px;min-height:60px;font-size:1em;font-family:inherit"></textarea></div>
                    <div><label style="font-weight:700;display:block;margin-bottom:6px">来源</label><select id="editSource" style="width:100%;padding:10px;border:2px solid #FDE68A;border-radius:10px"><option value="小红书">小红书</option><option value="大众点评">大众点评</option><option value="朋友推荐">朋友推荐</option><option value="自己吃过">自己吃过</option></select></div>
                    <div><label style="font-weight:700;display:block;margin-bottom:6px">来源链接</label><input type="url" id="editLink" style="width:100%;padding:10px;border:2px solid #FDE68A;border-radius:10px"></div>
                    <button type="submit" style="grid-column:span 2;padding:12px;background:linear-gradient(135deg,#FBBF24,#F59E0B);color:white;border:none;border-radius:12px;cursor:pointer;font-size:1em;font-weight:700">💾 保存修改</button>
                </form>
            </div>
        </div>

<div class="footer">
            <p>📊 数据来源：小红书 | 大众点评 | 用户贡献</p>
            <p>🕐 更新：<span id="updTime">-</span> | 📦 版本：v2.0</p>
            <p style="margin-top:8px"><a href="edit.html" style="color:var(--primary-dark);text-decoration:none;font-weight:700">✏️ 自主编辑</a> | <a href="update.html" style="color:var(--primary-dark);text-decoration:none;font-weight:700">📝 更新日志</a> | <a href="https://github.com/TTONG-WANG-1/waimai-queen" target="_blank" style="color:var(--primary-dark);text-decoration:none;font-weight:700">GitHub</a></p>
        </div>
    </div>
    
    <script>

        // 快速添加功能
        let qaTags=[];
        function toggleQuickAdd(){
            const card=document.getElementById('quickAddCard');
            card.style.display=card.style.display==='none'?'block':'none';
            if(card.style.display==='block'){
                document.getElementById('qaName').focus();
            }
        }
        function toggleQaTag(el){
            el.classList.toggle('active');
            const tag=el.textContent;
            if(el.classList.contains('active')){
                if(!qaTags.includes(tag))qaTags.push(tag);
            }else{
                const i=qaTags.indexOf(tag);
                if(i>-1)qaTags.splice(i,1);
            }
        }
        document.getElementById('qaTagInput').addEventListener('keydown',e=>{
            if(e.key==='Enter'&&e.target.value.trim()){
                e.preventDefault();
                const tag=e.target.value.trim();
                if(!qaTags.includes(tag)){
                    qaTags.push(tag);
                    const span=document.createElement('span');
                    span.className='tag active';
                    span.style.background='#FBBF24';
                    span.style.color='white';
                    span.textContent=tag;
                    span.onclick=function(){this.remove();const i=qaTags.indexOf(tag);if(i>-1)qaTags.splice(i,1);};
                    document.getElementById('qaTags').appendChild(span);
                }
                e.target.value='';
            }
        });
        document.getElementById('quickAddForm').addEventListener('submit',e=>{
            e.preventDefault();
            const shop={
                id:'user_'+Date.now(),
                name:document.getElementById('qaName').value,
                area:document.getElementById('qaArea').value,
                subArea:document.getElementById('qaSubArea').value,
                price:document.getElementById('qaPrice').value||'价格未知',
                rating:document.getElementById('qaRating').value,
                recs:document.getElementById('qaRecs').value.split(/[,,]/),
                tags:qaTags.length?qaTags:['用户推荐','待验证'],
                source:document.getElementById('qaSource').value,
                source_link:document.getElementById('qaLink').value,
                isUser:true,
                isPending:true,
                addedDate:new Date().toISOString().split('T')[0]
            };
            // 保存到 localStorage
            const user=JSON.parse(localStorage.getItem('userShops')||'[]');
            user.unshift(shop);
            localStorage.setItem('userShops',JSON.stringify(user));
            // 重新加载
            location.reload();
        });

                let shopData={},currDistrict='南山',userLat=null,userLng=null;
        
        async function init(){
            try{
                const sRes=await fetch('./data/shops.json');
                shopData=await sRes.json();
                initDistricts();
                selectDistrict('南山');
                getLocation();
            }catch(e){document.getElementById('shops').innerHTML='<div class="empty">⚠️ 数据加载失败</div>'}
        }
        
        function initDistricts(){
            const districts=['南山','福田','宝安','罗湖','龙华','龙岗'];
            const ds=document.getElementById('districtSel');
            ds.innerHTML='';
            districts.forEach(d=>{
                const count=shopData.shops.filter(s=>s.area===d).length;
                const b=document.createElement('button');
                b.className='district-btn';b.textContent=`${d} (${count})`;
                b.onclick=()=>selectDistrict(d);
                ds.appendChild(b);
            });
        }
        
        function selectDistrict(district){
            currDistrict=district;
            document.getElementById('currDistrict').textContent=district;
            document.querySelectorAll('.district-btn').forEach(b=>{
                b.classList.toggle('active',b.textContent.startsWith(district));
            });
            loadShops();
        }
        
        function getLocation(){
            const btn=document.getElementById('locateBtn'),status=document.getElementById('currLoc');
            btn.disabled=true;status.textContent='📡 定位中...';
            if(navigator.geolocation){
                navigator.geolocation.getCurrentPosition(pos=>{
                    userLat=pos.coords.latitude;userLng=pos.coords.longitude;
                    const area=getAreaFromCoords(userLat,userLng);
                    status.textContent=`📍 ${area}`;
                    if(area)selectDistrict(area.split('·')[0]);
                    btn.textContent='🔄 重定';btn.disabled=false;
                },()=>{status.textContent='❌ 定位失败';btn.textContent='📍 重试';btn.disabled=false},{enableHighAccuracy:true,timeout:8000});
            }else{status.textContent='❌ 不支持';btn.disabled=false}
        }
        
        function getAreaFromCoords(lat,lng){
            if(!lat||!lng)return null;
            if(lng<113.95&&lat>22.55)return'宝安';
            if(lng>=113.95&&lng<114.05&&lat>=22.52)return'南山';
            if(lng>=114.05&&lng<114.15&&lat>=22.52)return'福田';
            if(lng>=114.15)return'罗湖';
            if(lat<22.52)return'宝安';
            return'南山';
        }
        
        function calcDist(lat1,lng1,lat2,lng2){const R=6371,dLat=(lat2-lat1)*Math.PI/180,dLng=(lng2-lng1)*Math.PI/180,a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a))}
        
        function loadShops(){
            const el=document.getElementById('shops');
            el.innerHTML='<div class="loading">🍜 正在加载...</div>';
            setTimeout(()=>{
                // 1. 筛选当前区域的店铺
                let shops=shopData.shops.filter(s=>s.area===currDistrict);
                
                // 2. 过滤用户隐藏/删除的店铺
                const hidden=JSON.parse(localStorage.getItem('hiddenShops')||'[]');
                shops=shops.filter(s=>!hidden.includes(s.id));
                
                // 2. 严格按添加顺序（数据文件中已按时间排序，新的在前）
                // 不再重新排序，保持原始顺序
                if(userLat&&userLng){
                    // 只计算距离，不排序
                    shops=shops.map(s=>{
                        return {...s,dist:s.lat?calcDist(userLat,userLng,s.lat,s.lng):null};
                    });
                }
                
                if(shops.length===0){el.innerHTML='<div class="empty">😋 该区域暂无推荐</div>';return;}
                
                document.getElementById('shopsCount').textContent=`🍱 推荐店铺 (${shops.length}家)`;
                
                el.innerHTML=shops.map(s=>renderShop(s)).join('');
                document.getElementById('updTime').textContent=new Date(shopData.lastUpdate).toLocaleString('zh-CN');
            },100);
        }
        
        function renderShop(s){
            const isNew=s.tags&&s.tags.includes('🆕 新店')?`<span class="tag" style="background:#ff2442;color:white;border:none;animation:pulse 2s infinite">🆕 NEW</span>`:'';
            const dt=s.delivery?`<span class="tag" style="background:#dcfce7;color:#16a34a">🛵 ${s.delivery}</span>`:'';
            const xhs=s.source==='小红书'?`<span class="tag xhs">❤️ 小红书</span>`:'';
            const tg=s.tags?(Array.isArray(s.tags)?s.tags:s.tags.split(',')).filter(t=>t!=='🆕 新店').map(t=>`<span class="tag">🏷️ ${t}</span>`).join(''):'';
            const dist=s.dist?`<span class="tag distance">📏 ${s.dist.toFixed(1)}km</span>`:'';
            const userBadge=s.isUser?`<span class="tag" style="background:#10B981;color:white;border:none">🙋 我推荐的</span>`:'';
            const editBtns=`<div style="display:flex;gap:8px;margin-top:10px"><button onclick="openEditModal('${s.id}')" style="flex:1;padding:8px;background:#FBBF24;color:white;border:none;border-radius:8px;cursor:pointer;font-weight:700">✏️ 编辑</button><button onclick="deleteShop('${s.id}')" style="flex:1;padding:8px;background:#EF4444;color:white;border:none;border-radius:8px;cursor:pointer;font-weight:700">🗑️ 删除</button></div>`;
            const link=s.source_link||`https://www.google.com/search?q=${encodeURIComponent(s.name+' 深圳外卖')}`;
            const linkText=s.source==='小红书'?'❤️ 小红书详情':s.source==='大众点评'?'💬 大众点评详情':'🔍 查看详情';
            return `<div class="shop-item" style="${isNew?'border-color:#ff2442;':''}"><div class="shop-header"><div class="shop-name">${s.name}${userBadge}</div><div class="shop-rating">⭐${s.rating}</div></div><div class="shop-info"><span class="tag">💰 ${s.price}</span><span class="tag">📍 ${s.subArea}</span>${dist}${dt}${xhs}${isNew}${tg}</div><div class="recommend"><strong>🌟 推荐：</strong>${s.recs.join('、')}</div><div class="source"><span class="badge${s.source==='大众点评'?' dianping':''}">${s.source}</span><a href="${link}" target="_blank" class="shop-link">${linkText}→</a></div>${editBtns}</div>`;
        }
        

        // 编辑和删除功能
        let editShopId=null;
        function openEditModal(id){
            const user=JSON.parse(localStorage.getItem('userShops')||'[]');
            const shop=user.find(s=>s.id===id)||shopData.shops.find(s=>s.id===id);
            if(!shop)return;
            editShopId=id;
            document.getElementById('editShopId').value=shop.id;
            document.getElementById('editName').value=shop.name;
            document.getElementById('editArea').value=shop.area;
            document.getElementById('editSubArea').value=shop.subArea||'';
            document.getElementById('editPrice').value=shop.price||'';
            document.getElementById('editRating').value=shop.rating;
            document.getElementById('editRecs').value=shop.recs.join(',');
            document.getElementById('editSource').value=shop.source;
            document.getElementById('editLink').value=shop.source_link||'';
            document.getElementById('editModal').style.display='flex';
        }
        function closeEditModal(){document.getElementById('editModal').style.display='none';}
        function deleteShop(id){
            if(!confirm('确定要删除这家店铺吗？

注意：只能删除用户添加的店铺，官方店铺将恢复显示。'))return;
            const user=JSON.parse(localStorage.getItem('userShops')||'[]');
            const filtered=user.filter(s=>s.id!==id);
            localStorage.setItem('userShops',JSON.stringify(filtered));
            // 同时保存到隐藏列表（用于隐藏官方店铺）
            const hidden=JSON.parse(localStorage.getItem('hiddenShops')||'[]');
            if(!hidden.includes(id))hidden.push(id);
            localStorage.setItem('hiddenShops',JSON.stringify(hidden));
            location.reload();
        }
        document.getElementById('editShopForm').addEventListener('submit',e=>{
            e.preventDefault();
            const user=JSON.parse(localStorage.getItem('userShops')||'[]');
            const shop=user.find(s=>s.id===editShopId);
            if(!shop){alert('❌ 未找到店铺');return;}
            shop.name=document.getElementById('editName').value;
            shop.area=document.getElementById('editArea').value;
            shop.subArea=document.getElementById('editSubArea').value;
            shop.price=document.getElementById('editPrice').value;
            shop.rating=document.getElementById('editRating').value;
            shop.recs=document.getElementById('editRecs').value.split(/[,,]/);
            shop.source=document.getElementById('editSource').value;
            shop.source_link=document.getElementById('editLink').value;
            localStorage.setItem('userShops',JSON.stringify(user));
            closeEditModal();
            location.reload();
        });
        
        init();
    </script>
</body>
