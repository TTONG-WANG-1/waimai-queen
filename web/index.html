<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>外卖女王</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@400;600;700;800&family=Varela+Round&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        
        :root{
            --primary:#FBBF24;
            --primary-dark:#F59E0B;
            --primary-light:#FCD34D;
            --secondary:#FEF3C7;
            --accent:#F97316;
            --accent-hover:#EA580C;
            --bg:#FFFBEB;
            --bg-card:#FFFFFF;
            --text:#1F2937;
            --text-light:#6B7280;
            --border:#FDE68A;
            --shadow:0 4px 12px rgba(251,191,36,0.15);
            --shadow-hover:0 8px 24px rgba(251,191,36,0.25);
            --radius:16px;
            --radius-sm:12px;
            --radius-lg:20px;
        }
        
        body{
            font-family:'Nunito Sans',-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;
            background:linear-gradient(180deg,var(--bg) 0%,#FEF9E7 100%);
            min-height:100vh;
            padding:20px;
            color:var(--text);
        }
        
        .container{max-width:1000px;margin:0 auto}
        
        .header{
            text-align:center;
            margin-bottom:32px;
            padding:24px;
        }
        
        .header h1{
            font-family:'Varela Round',sans-serif;
            font-size:3em;
            background:linear-gradient(135deg,var(--primary-dark),var(--accent));
            -webkit-background-clip:text;
            -webkit-text-fill-color:transparent;
            background-clip:text;
            margin-bottom:8px;
            filter:drop-shadow(2px 2px 4px rgba(251,191,36,0.3));
        }
        
        .header p{
            font-size:1.1em;
            color:var(--text-light);
            font-weight:600;
        }
        
        .card{
            background:var(--bg-card);
            border-radius:var(--radius-lg);
            padding:24px;
            margin-bottom:20px;
            box-shadow:var(--shadow);
            border:2px solid var(--border);
        }
        
        .card-title{
            font-size:1.4em;
            font-weight:800;
            margin-bottom:20px;
            color:var(--primary-dark);
            display:flex;
            align-items:center;
            gap:8px;
        }
        
        .step{margin-bottom:20px}
        
        .step-title{
            font-weight:700;
            color:var(--text);
            margin-bottom:12px;
            font-size:1.05em;
        }
        
        .selector{display:flex;flex-wrap:wrap;gap:10px}
        
        .btn{
            padding:10px 20px;
            border:2px solid var(--primary);
            border-radius:25px;
            background:white;
            color:var(--primary-dark);
            cursor:pointer;
            transition:all 0.2s ease;
            font-size:0.95em;
            font-weight:600;
        }
        
        .btn:hover{
            transform:translateY(-2px);
            box-shadow:0 4px 12px rgba(251,191,36,0.3);
        }
        
        .btn.active{
            background:linear-gradient(135deg,var(--primary),var(--primary-light));
            color:white;
            border-color:var(--primary-dark);
            box-shadow:0 4px 12px rgba(251,191,36,0.4);
        }
        
        .btn-line{
            border-color:var(--accent);
            color:var(--accent);
        }
        
        .btn-line.active{
            background:linear-gradient(135deg,var(--accent),var(--accent-hover));
            color:white;
            border-color:var(--accent);
        }
        
        .range-selector{display:flex;gap:10px}
        
        .range-btn{
            padding:8px 18px;
            border:2px solid var(--primary);
            border-radius:20px;
            background:white;
            color:var(--primary-dark);
            cursor:pointer;
            font-size:0.9em;
            font-weight:600;
            transition:all 0.2s ease;
        }
        
        .range-btn:hover{
            transform:translateY(-2px);
            box-shadow:0 4px 12px rgba(251,191,36,0.3);
        }
        
        .range-btn.active{
            background:linear-gradient(135deg,var(--primary),var(--primary-light));
            color:white;
            border-color:var(--primary-dark);
        }
        
        .location-info{
            padding:16px;
            background:linear-gradient(135deg,var(--secondary),#FEF9C3);
            border-radius:var(--radius);
            margin-top:16px;
            border:2px dashed var(--primary);
        }
        
        .location-info strong{
            color:var(--accent);
            font-weight:800;
        }
        
        .shops-header{
            display:flex;
            justify-content:space-between;
            align-items:center;
            margin-bottom:20px;
            flex-wrap:wrap;
            gap:12px;
        }
        
        .shop-item{
            border:2px solid var(--border);
            border-radius:var(--radius);
            padding:20px;
            margin-bottom:16px;
            transition:all 0.3s ease;
            background:linear-gradient(135deg,#FFFEFB,#FFFBF0);
            cursor:pointer;
        }
        
        .shop-item:hover{
            border-color:var(--primary-dark);
            transform:translateX(8px) translateY(-2px);
            box-shadow:var(--shadow-hover);
        }
        
        .shop-header{
            display:flex;
            justify-content:space-between;
            align-items:start;
            margin-bottom:12px;
            flex-wrap:wrap;
            gap:8px;
        }
        
        .shop-name{
            font-size:1.3em;
            font-weight:800;
            color:var(--text);
        }
        
        .shop-rating{
            padding:6px 14px;
            background:linear-gradient(135deg,var(--primary),var(--accent));
            border-radius:14px;
            font-weight:800;
            color:white;
            font-size:0.95em;
            box-shadow:0 2px 8px rgba(251,191,36,0.4);
        }
        
        .shop-info{
            display:flex;
            gap:10px;
            margin-bottom:12px;
            flex-wrap:wrap;
        }
        
        .tag{
            padding:6px 14px;
            background:var(--secondary);
            border-radius:14px;
            font-size:0.9em;
            color:var(--primary-dark);
            font-weight:600;
            border:1px solid var(--primary-light);
        }
        
        .tag.distance{
            background:linear-gradient(135deg,#FEF3C7,#FDE68A);
            color:#92400E;
            border-color:var(--primary);
        }
        
        .recommend{
            background:linear-gradient(135deg,#FFFBEB,#FEF3C7);
            padding:14px;
            border-radius:var(--radius-sm);
            border-left:4px solid var(--accent);
            margin-bottom:12px;
        }
        
        .recommend strong{
            color:var(--accent);
            font-weight:800;
        }
        
        .source{
            display:flex;
            justify-content:space-between;
            align-items:center;
            flex-wrap:wrap;
            gap:8px;
        }
        
        .badge{
            padding:6px 14px;
            background:linear-gradient(135deg,#F97316,#FB923C);
            color:white;
            border-radius:14px;
            font-size:0.85em;
            font-weight:700;
            box-shadow:0 2px 8px rgba(249,115,22,0.3);
        }
        
        .badge.dianping{
            background:linear-gradient(135deg,#FF6B35,#F97316);
        }
        
        .shop-link{
            color:var(--primary-dark);
            text-decoration:none;
            font-weight:700;
            padding:8px 16px;
            background:var(--secondary);
            border-radius:12px;
            transition:all 0.2s ease;
            border:2px solid var(--primary-light);
        }
        
        .shop-link:hover{
            background:var(--primary);
            color:white;
            transform:translateY(-2px);
        }
        
        .loading,.empty{
            text-align:center;
            padding:60px 20px;
            color:var(--text-light);
            font-size:1.1em;
        }
        
        .footer{
            text-align:center;
            color:var(--text-light);
            margin-top:24px;
            padding:20px;
            background:linear-gradient(135deg,var(--bg-card),var(--bg));
            border-radius:var(--radius);
            border:2px solid var(--border);
        }
        
        @media(max-width:600px){
            .header h1{font-size:2em}
            .btn{padding:8px 14px;font-size:0.9em}
            .shop-item{padding:16px}
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>👑 外卖女王</h1>
            <p>深圳外卖推荐助手 · 真实评价</p>
        </div>
        
        <div class="card">
            <div class="card-title">📍 精准定位</div>
            <div class="step">
                <div class="step-title">1️⃣ 选地铁线路</div>
                <div class="selector" id="lineSel"></div>
            </div>
            <div class="step">
                <div class="step-title">2️⃣ 选地铁站</div>
                <div class="selector" id="stationSel"></div>
            </div>
            <div class="step">
                <div class="step-title">3️⃣ 搜索范围</div>
                <div class="range-selector">
                    <button class="range-btn" onclick="setRange(2)">2 公里</button>
                    <button class="range-btn active" onclick="setRange(3)">3 公里</button>
                    <button class="range-btn" onclick="setRange(5)">5 公里</button>
                </div>
            </div>
            <div class="location-info">
                📍 当前位置：<strong id="currLoc">请选择地铁站</strong>
                <div style="margin-top:8px;font-size:0.95em;color:#92400E">
                    🔍 搜索范围：<strong id="currRange">3 公里</strong>
                </div>
            </div>
        </div>
        
        <div class="card">
            <div class="shops-header">
                <span style="font-size:1.4em;font-weight:800;color:var(--primary-dark)">🍱 推荐店铺</span>
                <button class="btn btn-line active" onclick="loadShops()">🔄 换一批</button>
            </div>
            <div id="shops"></div>
        </div>
        
        <div class="footer">
            <p>📊 数据来源：小红书 | 大众点评</p>
            <p>🕐 更新：<span id="updTime">-</span></p>
        </div>
    </div>
    
    <script>
        let metroData={},shopData={},currLine='1 号线',currStation='高新园',currRange=3,shownIds=[];
        
        async function init(){
            try{
                const[mRes,sRes]=await Promise.all([fetch('./data/metro.json'),fetch('./data/shops.json')]);
                metroData=await mRes.json();shopData=await sRes.json();
                renderLines();
                renderStations();
                loadShops();
            }catch(e){
                console.error('加载失败:',e);
                document.getElementById('shops').innerHTML='<div class="empty">⚠️ 数据加载失败，请刷新页面</div>';
            }
        }
        
        function renderLines(){
            const ls=document.getElementById('lineSel');
            ls.innerHTML='';
            const lines=Object.keys(metroData);
            lines.forEach((line,i)=>{
                const b=document.createElement('button');
                b.className='btn btn-line'+(i===0?' active':'');
                b.textContent=line;
                b.onclick=()=>selectLine(line,i);
                ls.appendChild(b);
            });
        }
        
        function selectLine(line,idx){
            currLine=line;
            currStation=metroData[line][0].name;
            const btns=document.querySelectorAll('#lineSel .btn');
            btns.forEach((b,i)=>b.classList.toggle('active',i===idx));
            renderStations();
            updLoc();
            loadShops();
        }
        
        function renderStations(){
            const ss=document.getElementById('stationSel');
            ss.innerHTML='';
            const stations=metroData[currLine];
            stations.forEach((s,i)=>{
                const b=document.createElement('button');
                b.className='btn'+(i===0?' active':'');
                b.textContent=s.name;
                b.onclick=()=>selectStation(s.name,i);
                ss.appendChild(b);
            });
        }
        
        function selectStation(name,idx){
            currStation=name;
            const btns=document.querySelectorAll('#stationSel .btn');
            btns.forEach((b,i)=>b.classList.toggle('active',i===idx));
            updLoc();
            loadShops();
        }
        
        function setRange(r){
            currRange=r;
            const btns=document.querySelectorAll('.range-btn');
            btns.forEach((b,i)=>{
                const val=[2,3,5][i];
                b.classList.toggle('active',val===r);
            });
            document.getElementById('currRange').textContent=r+'公里';
            shownIds=[];
            loadShops();
        }
        
        function updLoc(){
            document.getElementById('currLoc').textContent=currStation;
        }
        
        function calcDist(lat1,lng1,lat2,lng2){
            const R=6371;
            const dLat=(lat2-lat1)*Math.PI/180;
            const dLng=(lng2-lng1)*Math.PI/180;
            const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
            return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
        }
        
        function loadShops(){
            const el=document.getElementById('shops');
            el.innerHTML='<div class="loading">🍜 正在寻找美食...</div>';
            
            setTimeout(()=>{
                const station=metroData[currLine].find(s=>s.name===currStation);
                if(!station){
                    el.innerHTML='<div class="empty">⚠️ 站点数据缺失</div>';
                    return;
                }
                
                // 计算距离并筛选
                let shops=shopData.shops.map(s=>({
                    ...s,
                    dist:calcDist(station.lat,station.lng,s.lat,s.lng)
                }));
                
                // 优先筛选范围内的店铺
                let inRange=shops.filter(s=>s.dist<=currRange);
                let outRange=shops.filter(s=>s.dist>currRange);
                
                // 综合评分排序（评分*0.6 + 距离分*0.4）
                function calcScore(shop){
                    const ratingScore=parseFloat(shop.rating)*20; // 5 分制转 100 分
                    const distScore=Math.max(0,100-shop.dist*20); // 距离越近分越高
                    return ratingScore*0.6+distScore*0.4;
                }
                
                inRange.sort((a,b)=>calcScore(b)-calcScore(a));
                outRange.sort((a,b)=>calcScore(b)-calcScore(a));
                
                // 优先显示范围内的，不足则补充范围外的优质店铺
                let display=[...inRange,...outRange].slice(0,15);
                
                if(display.length===0){
                    el.innerHTML='<div class="empty">😋 该区域暂无推荐，换个位置试试～</div>';
                    return;
                }
                
                // 智能换一批：优先展示未显示的
                if(shownIds.length>=display.length){
                    shownIds=[];
                }
                
                const available=display.filter(s=>!shownIds.includes(s.id));
                const toShow=available.length>=10?available:display;
                const result=toShow.slice(0,12); // 每次显示 12 家
                
                shownIds.push(...result.map(s=>s.id));
                
                // 分组显示：按距离分 3 组
                const veryNear=result.filter(s=>s.dist<=1);
                const near=result.filter(s=>s.dist>1&&s.dist<=3);
                const far=result.filter(s=>s.dist>3);
                
                let html='';
                
                if(veryNear.length>0){
                    html+='<div style="margin-bottom:16px"><div style="font-size:1.1em;font-weight:700;color:var(--primary-dark);margin-bottom:8px">🚶 步行可达（<1km）</div>';
                    html+=veryNear.map(s=>renderShop(s)).join('');
                    html+='</div>';
                }
                
                if(near.length>0){
                    html+='<div style="margin-bottom:16px"><div style="font-size:1.1em;font-weight:700;color:var(--primary-dark);margin-bottom:8px">🚴 骑行可达（1-3km）</div>';
                    html+=near.map(s=>renderShop(s)).join('');
                    html+='</div>';
                }
                
                if(far.length>0){
                    html+='<div style="margin-bottom:16px"><div style="font-size:1.1em;font-weight:700;color:var(--primary-dark);margin-bottom:8px">🚗 稍远但值得（>3km）</div>';
                    html+=far.map(s=>renderShop(s)).join('');
                    html+='</div>';
                }
                
                el.innerHTML=html;
                document.getElementById('updTime').textContent=new Date(shopData.lastUpdate).toLocaleString('zh-CN');
            },100);
        }
        
        function renderShop(s){
            return '<div class="shop-item">'+
                '<div class="shop-header">'+
                    '<div class="shop-name">'+s.name+'</div>'+
                    '<div class="shop-rating">⭐'+s.rating+'</div>'+
                '</div>'+
                '<div class="shop-info">'+
                    '<span class="tag">💰'+s.price+'</span>'+
                    '<span class="tag">📍'+s.area+'·'+s.subArea+'</span>'+
                    '<span class="tag distance">📏'+s.dist.toFixed(1)+'km</span>'+
                '</div>'+
                '<div class="recommend">'+
                    '<strong>🌟 推荐：</strong>'+s.recs.join('、')+
                '</div>'+
                '<div class="source">'+
                    '<span class="badge'+(s.source==='大众点评'?' dianping':'')+'">'+s.source+'</span>'+
                    '<a href="https://www.google.com/search?q='+encodeURIComponent(s.name+' 外卖')+'&btnI=1" target="_blank" class="shop-link">查看→</a>'+
                '</div>'+
            '</div>';
        }
        
        init();
    </script>
</body>
</html>
