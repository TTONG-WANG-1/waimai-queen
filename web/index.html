<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>外卖女王 👑 深圳外卖推荐</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563EB;
            --primary-light: #3B82F6;
            --cta: #F97316;
            --cta-hover: #EA580C;
            --shadow-lg: 0 8px 32px rgba(37, 99, 235, 0.2);
            --radius-lg: 16px;
            --radius-xl: 24px;
            --radius-full: 9999px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            min-height: 100vh;
            padding: 20px;
            color: #1E293B;
            line-height: 1.6;
        }
        .container { max-width: 900px; margin: 0 auto; }
        .header {
            text-align: center;
            margin-bottom: 48px;
        }
        .header h1 {
            font-family: 'Fredoka', sans-serif;
            font-size: clamp(2.5em, 6vw, 4em);
            font-weight: 700;
            color: white;
            text-shadow: 4px 4px 0px rgba(0,0,0,0.2), 0 8px 24px rgba(0,0,0,0.3);
            margin-bottom: 8px;
            animation: bounce 2s ease-in-out infinite;
            display: inline-block;
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .header p {
            font-size: 1.2em;
            color: rgba(255,255,255,0.95);
            font-weight: 500;
        }
        .card {
            background: white;
            border-radius: var(--radius-xl);
            padding: 32px;
            margin-bottom: 24px;
            box-shadow: var(--shadow-lg);
            border: 3px solid rgba(255,255,255,0.3);
        }
        .card-title {
            font-family: 'Fredoka', sans-serif;
            font-size: 1.5em;
            font-weight: 600;
            margin-bottom: 24px;
        }
        .area-selector, .sub-area-selector {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 16px;
        }
        .area-btn, .sub-area-btn {
            padding: 10px 20px;
            border: 3px solid var(--primary-light);
            border-radius: var(--radius-full);
            background: white;
            color: var(--primary);
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Fredoka', sans-serif;
            font-size: 0.95em;
            font-weight: 500;
        }
        .area-btn:hover, .sub-area-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 16px rgba(37, 99, 235, 0.3);
        }
        .area-btn.active, .sub-area-btn.active {
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            color: white;
        }
        .sub-area-btn {
            border-color: var(--cta);
            color: var(--cta);
            font-size: 0.85em;
            padding: 8px 16px;
        }
        .sub-area-btn.active {
            background: linear-gradient(135deg, var(--cta), var(--cta-hover));
            border-color: var(--cta);
        }
        .shops-title {
            font-family: 'Fredoka', sans-serif;
            font-size: 1.5em;
            font-weight: 600;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .refresh-btn {
            padding: 10px 24px;
            background: linear-gradient(135deg, var(--cta), var(--cta-hover));
            color: white;
            border: none;
            border-radius: var(--radius-full);
            cursor: pointer;
            font-family: 'Fredoka', sans-serif;
            font-size: 0.95em;
            font-weight: 600;
            transition: all 0.3s;
        }
        .refresh-btn:hover {
            transform: scale(1.05);
        }
        .shop-item {
            border: 3px solid #f0f0f0;
            border-radius: var(--radius-lg);
            padding: 24px;
            margin-bottom: 16px;
            transition: all 0.3s;
            background: white;
        }
        .shop-item:hover {
            border-color: var(--primary-light);
            transform: translateX(8px);
            box-shadow: var(--shadow-lg);
        }
        .shop-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 16px;
        }
        .shop-name {
            font-family: 'Fredoka', sans-serif;
            font-size: 1.3em;
            font-weight: 600;
        }
        .shop-rating {
            padding: 6px 12px;
            background: linear-gradient(135deg, #FFD700, #FFA500);
            border-radius: var(--radius-full);
            font-weight: 700;
            color: white;
        }
        .shop-info {
            display: flex;
            gap: 16px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }
        .info-tag {
            padding: 4px 12px;
            background: #f0f4ff;
            border-radius: var(--radius-full);
            font-weight: 500;
        }
        .shop-recommend {
            background: linear-gradient(135deg, #fff5f0, #fff);
            padding: 16px;
            border-radius: 12px;
            border-left: 4px solid var(--cta);
            margin-bottom: 16px;
        }
        .shop-source {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .source-badge {
            padding: 6px 14px;
            background: linear-gradient(135deg, #ff2442, #ff0040);
            color: white;
            border-radius: var(--radius-full);
            font-weight: 600;
        }
        .shop-link {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            padding: 8px 16px;
            border: 2px solid var(--primary);
            border-radius: var(--radius-full);
            transition: all 0.3s;
        }
        .shop-link:hover {
            background: var(--primary);
            color: white;
        }
        .loading, .empty-state {
            text-align: center;
            padding: 48px;
        }
        .loading { color: var(--primary); }
        .footer {
            text-align: center;
            color: white;
            margin-top: 48px;
            padding: 24px;
            background: rgba(255,255,255,0.15);
            border-radius: var(--radius-xl);
        }
        @media (max-width: 600px) {
            body { padding: 12px; }
            .header h1 { font-size: 2em; }
            .card { padding: 20px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>👑 外卖女王</h1>
            <p>深圳外卖推荐助手 · 每天更新</p>
        </div>
        
        <div class="card">
            <div class="card-title">📍 选择您的位置</div>
            <div class="area-selector" id="areaSelector"></div>
            <div class="sub-area-selector" id="subAreaSelector"></div>
        </div>
        
        <div class="card">
            <div class="shops-title">
                <span>🍱 今日推荐</span>
                <button class="refresh-btn" onclick="loadShops()">🔄 刷新</button>
            </div>
            <div id="shopsList">
                <div class="loading">🍜 正在寻找美食...</div>
            </div>
        </div>
        
        <div class="footer">
            <p>数据来源：小红书 | 大众点评</p>
            <p>更新时间：<span id="updateTime">-</span></p>
        </div>
    </div>

    <script>
        const areas = {
            "南山区": ["科技园", "海岸城", "深圳湾", "前海", "西丽", "南油", "蛇口"],
            "福田区": ["CBD", "车公庙", "华强北", "香蜜湖", "岗厦", "梅林"],
            "罗湖区": ["国贸", "东门", "万象城", "湖贝", "笋岗"],
            "宝安区": ["宝安中心", "西乡", "福永", "沙井", "新安"],
            "龙华区": ["深圳北站", "龙华中心", "民治", "观澜"],
            "龙岗区": ["大运", "龙岗中心城", "布吉", "坂田"]
        };
        
        let currentArea = '南山区';
        let currentSubArea = '科技园';
        
        // 初始化区域选择器
        function initAreaSelector() {
            const areaSelector = document.getElementById('areaSelector');
            Object.keys(areas).forEach(area => {
                const btn = document.createElement('button');
                btn.className = 'area-btn' + (area === currentArea ? ' active' : '');
                btn.textContent = area;
                btn.onclick = () => selectArea(area);
                areaSelector.appendChild(btn);
            });
            updateSubAreas();
        }
        
        // 选择主区域
        function selectArea(area) {
            currentArea = area;
            currentSubArea = areas[area][0];
            document.querySelectorAll('.area-btn').forEach(btn => {
                btn.classList.toggle('active', btn.textContent === area);
            });
            updateSubAreas();
            loadShops();
        }
        
        // 更新子区域
        function updateSubAreas() {
            const subAreaSelector = document.getElementById('subAreaSelector');
            subAreaSelector.innerHTML = '';
            areas[currentArea].forEach(sub => {
                const btn = document.createElement('button');
                btn.className = 'sub-area-btn' + (sub === currentSubArea ? ' active' : '');
                btn.textContent = sub;
                btn.onclick = () => selectSubArea(sub);
                subAreaSelector.appendChild(btn);
            });
        }
        
        // 选择子区域
        function selectSubArea(sub) {
            currentSubArea = sub;
            document.querySelectorAll('.sub-area-btn').forEach(btn => {
                btn.classList.toggle('active', btn.textContent === sub);
            });
            loadShops();
        }
        
        // 加载店铺数据
        async function loadShops() {
            const shopsList = document.getElementById('shopsList');
            shopsList.innerHTML = '<div class="loading">🍜 正在寻找美食...</div>';
            
            try {
                const response = await fetch('data/shops.json');
                const data = await response.json();
                
                // 过滤当前区域的店铺
                const filteredShops = data.shops.filter(shop => 
                    shop.area === currentArea && shop.subArea === currentSubArea
                );
                
                if (filteredShops.length === 0) {
                    shopsList.innerHTML = `
                        <div class="empty-state">
                            <p>😋 暂无推荐</p>
                            <p>该区域暂无外卖推荐，换个区域试试吧～</p>
                        </div>
                    `;
                    return;
                }
                
                // 渲染店铺列表
                shopsList.innerHTML = filteredShops.map(shop => `
                    <div class="shop-item">
                        <div class="shop-header">
                            <div class="shop-name">${shop.name}</div>
                            <div class="shop-rating">⭐ ${shop.rating}</div>
                        </div>
                        <div class="shop-info">
                            <span class="info-tag">💰 ${shop.price}</span>
                            <span class="info-tag">📍 ${shop.area}·${shop.subArea}</span>
                        </div>
                        <div class="shop-recommend">
                            🌟 推荐：${shop.recommendations.join('、')}
                        </div>
                        <div class="shop-source">
                            <span class="source-badge">${shop.source}</span>
                            <a href="${shop.link}" target="_blank" class="shop-link">查看详情 →</a>
                        </div>
                    </div>
                `).join('');
                
                document.getElementById('updateTime').textContent = new Date(data.lastUpdate).toLocaleString('zh-CN');
                
            } catch (error) {
                shopsList.innerHTML = `
                    <div class="empty-state">
                        <p>😢 加载失败</p>
                        <p>请稍后再试</p>
                    </div>
                `;
                console.error('Error:', error);
            }
        }
        
        // 页面加载时初始化
        initAreaSelector();
        loadShops();
    </script>
</body>
</html>
