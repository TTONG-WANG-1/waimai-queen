<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>外卖女王</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif;background:linear-gradient(135deg,#667eea,#764ba2,#f093fb);min-height:100vh;padding:20px}
        .container{max-width:1000px;margin:0 auto}
        .header{text-align:center;color:white;margin-bottom:30px}
        .header h1{font-size:2.5em;margin-bottom:10px}
        .card{background:white;border-radius:16px;padding:20px;margin-bottom:20px;box-shadow:0 8px 32px rgba(0,0,0,0.2)}
        .card-title{font-size:1.3em;font-weight:600;margin-bottom:16px;color:#1a1a2e}
        .step{margin-bottom:16px}
        .step-title{font-weight:600;color:#667eea;margin-bottom:8px}
        .selector{display:flex;flex-wrap:wrap;gap:8px}
        .btn{padding:8px 16px;border:2px solid #667eea;border-radius:20px;background:white;color:#667eea;cursor:pointer;transition:all 0.3s}
        .btn:hover{transform:scale(1.05)}
        .btn.active{background:#667eea;color:white}
        .btn-line{border-color:#f97316;color:#f97316}
        .btn-line.active{background:#f97316;color:white}
        .range-selector{display:flex;gap:8px}
        .range-btn{padding:6px 14px;border:2px solid #667eea;border-radius:16px;background:white;color:#667eea;cursor:pointer}
        .range-btn.active{background:#667eea;color:white}
        .location-info{padding:12px;background:linear-gradient(135deg,#f0f4ff,#e0e7ff);border-radius:12px;margin-top:12px;border:2px solid #667eea}
        .location-info strong{color:#f97316}
        .shops-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:8px}
        .shop-item{border:2px solid #f0f0f0;border-radius:12px;padding:16px;margin-bottom:12px;transition:all 0.3s;background:#fafaff}
        .shop-item:hover{border-color:#667eea;transform:translateX(8px);box-shadow:0 4px 16px rgba(102,126,234,0.2)}
        .shop-header{display:flex;justify-content:space-between;align-items:start;margin-bottom:8px;flex-wrap:wrap;gap:8px}
        .shop-name{font-size:1.2em;font-weight:600;color:#1a1a2e}
        .shop-rating{padding:4px 12px;background:linear-gradient(135deg,#FFD700,#FFA500);border-radius:12px;font-weight:700;color:white}
        .shop-info{display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap}
        .tag{padding:4px 10px;background:#f0f4ff;border-radius:12px;font-size:0.9em;color:#667eea}
        .tag.distance{background:#fef3c7;color:#d97706}
        .recommend{background:linear-gradient(135deg,#fff5f0,#fff);padding:10px;border-radius:8px;border-left:3px solid #f97316;margin-bottom:8px}
        .source{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
        .badge{padding:4px 10px;background:linear-gradient(135deg,#ff2442,#ff6b6b);color:white;border-radius:12px;font-size:0.85em}
        .badge.dianping{background:linear-gradient(135deg,#ff6600,#ff8800)}
        .loading,.empty{text-align:center;padding:40px;color:#666}
        .footer{text-align:center;color:white;margin-top:20px;padding:16px;background:rgba(255,255,255,0.15);border-radius:12px}
        @media(max-width:600px){.header h1{font-size:1.8em}.btn{padding:6px 12px}}
    </style>
</head>
<body>
    <div class="container">
        <div class="header"><h1>👑 外卖女王</h1><p>深圳外卖推荐助手</p></div>
        <div class="card">
            <div class="card-title">📍 精准定位</div>
            <div class="step"><div class="step-title">1️⃣ 选地铁线路</div><div class="selector" id="lineSel"></div></div>
            <div class="step"><div class="step-title">2️⃣ 选地铁站</div><div class="selector" id="stationSel"></div></div>
            <div class="step"><div class="step-title">3️⃣ 搜索范围</div><div class="range-selector"><button class="range-btn" onclick="setRange(2)">2 公里</button><button class="range-btn active" onclick="setRange(3)">3 公里</button><button class="range-btn" onclick="setRange(5)">5 公里</button></div></div>
            <div class="location-info">📍 当前位置：<strong id="currLoc">请选择地铁站</strong><div style="margin-top:6px;font-size:0.9em;color:#666">🔍 搜索范围：<strong id="currRange">3 公里</strong></div></div>
        </div>
        <div class="card">
            <div class="shops-header"><span style="font-size:1.3em;font-weight:600;color:#1a1a2e">🍱 推荐店铺</span><button class="btn btn-line active" onclick="loadShops()">🔄 换一批</button></div>
            <div id="shops"></div>
        </div>
        <div class="footer"><p>📊 数据来源：小红书 | 大众点评</p><p>🕐 更新：<span id="updTime">-</span></p></div>
    </div>
    <script>
        let metroData={},shopData={},currLine='1 号线',currStation='高新园',currRange=3,shownIds=[];
        async function init(){
            try{
                const[mRes,sRes]=await Promise.all([fetch('data/metro.json'),fetch('data/shops.json')]);
                metroData=await mRes.json();shopData=await sRes.json();
                const ls=document.getElementById('lineSel');
                Object.keys(metroData).forEach((line,i)=>{
                    const b=document.createElement('button');
                    b.className='btn btn-line'+(i===0?' active':'');b.textContent=line;
                    b.onclick=()=>{currLine=line;currStation=metroData[line][0].name;document.querySelectorAll('#lineSel .btn').forEach(x=>x.classList.toggle('active',x.textContent===line));updStations();updLoc();loadShops();};
                    ls.appendChild(b);
                });
                updStations();loadShops();
            }catch(e){document.getElementById('shops').innerHTML='<div class="empty">⚠️ 数据加载失败，请刷新页面</div>'}
        }
        function updStations(){
            const ss=document.getElementById('stationSel');ss.innerHTML='';
            metroData[currLine].forEach((s,i)=>{
                const b=document.createElement('button');
                b.className='btn'+(i===0?' active':'');b.textContent=s.name;
                b.onclick=()=>{currStation=s.name;document.querySelectorAll('#stationSel .btn').forEach(x=>x.classList.toggle('active',x.textContent===s.name));updLoc();loadShops();};
                ss.appendChild(b);
            });
        }
        function setRange(r){currRange=r;document.querySelectorAll('.range-btn').forEach(b=>b.classList.toggle('active',b.textContent.includes(r+'公里')));document.getElementById('currRange').textContent=r+'公里';loadShops();}
        function updLoc(){document.getElementById('currLoc').textContent=currStation;}
        function calcDist(lat1,lng1,lat2,lng2){const R=6371,dLat=(lat2-lat1)*Math.PI/180,dLng=(lng2-lng1)*Math.PI/180,a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));}
        function loadShops(){
            const el=document.getElementById('shops');el.innerHTML='<div class="loading">🍜 正在寻找美食...</div>';
            setTimeout(()=>{
                const station=metroData[currLine].find(s=>s.name===currStation);
                if(!station){el.innerHTML='<div class="empty">⚠️ 站点数据缺失</div>';return;}
                let shops=shopData.shops.map(s=>({...s,dist:calcDist(station.lat,station.lng,s.lat,s.lng)})).filter(s=>s.dist<=currRange).sort((a,b)=>a.dist-b.dist);
                if(shops.length===0){el.innerHTML='<div class="empty">😋 该区域暂无推荐，换个位置试试～</div>';return;}
                if(shownIds.length>=shops.length)shownIds=[];
                const available=shops.filter(s=>!shownIds.includes(s.id));
                const toShow=available.slice(0,10);
                if(toShow.length===0){shownIds=[];loadShops();return;}
                shownIds.push(...toShow.map(s=>s.id));
                el.innerHTML=toShow.map(s=>'<div class="shop-item"><div class="shop-header"><div class="shop-name">'+s.name+'</div><div class="shop-rating">⭐'+s.rating+'</div></div><div class="shop-info"><span class="tag">💰'+s.price+'</span><span class="tag">📍'+s.area+'·'+s.subArea+'</span><span class="tag distance">📏'+s.dist.toFixed(1)+'km</span></div><div class="recommend"><strong>🌟 推荐：</strong>'+s.recs.join('、')+'</div><div class="source"><span class="badge'+(s.source==='大众点评'?' dianping':'')+'">'+s.source+'</span><a href="https://www.google.com/search?q='+encodeURIComponent(s.name+' 外卖')+'&btnI=1" target="_blank" style="color:#667eea;text-decoration:none;font-weight:600;padding:4px 10px;background:#f0f4ff;border-radius:10px">查看→</a></div></div>').join('');
                document.getElementById('updTime').textContent=new Date(shopData.lastUpdate).toLocaleString('zh-CN');
            },200);
        }
        init();
    </script>
</body>
</html>
