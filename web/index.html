<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>外卖女王 👑 深圳外卖推荐</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        
        .header p {
            opacity: 0.9;
            font-size: 1.1em;
        }
        
        .location-card {
            background: white;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .location-title {
            font-size: 1.2em;
            color: #333;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .area-selector {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 15px;
        }
        
        .area-btn {
            padding: 8px 16px;
            border: 2px solid #667eea;
            border-radius: 20px;
            background: white;
            color: #667eea;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.95em;
        }
        
        .area-btn:hover, .area-btn.active {
            background: #667eea;
            color: white;
        }
        
        .sub-area-selector {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        
        .sub-area-btn {
            padding: 6px 12px;
            border: 1px solid #ddd;
            border-radius: 15px;
            background: #f8f9fa;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.9em;
        }
        
        .sub-area-btn:hover, .sub-area-btn.active {
            background: #764ba2;
            color: white;
            border-color: #764ba2;
        }
        
        .shops-card {
            background: white;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .shops-title {
            font-size: 1.3em;
            color: #333;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .refresh-btn {
            padding: 8px 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9em;
            transition: transform 0.3s;
        }
        
        .refresh-btn:hover {
            transform: scale(1.05);
        }
        
        .shop-item {
            border: 1px solid #eee;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            transition: all 0.3s;
        }
        
        .shop-item:hover {
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transform: translateY(-2px);
        }
        
        .shop-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 10px;
        }
        
        .shop-name {
            font-size: 1.2em;
            color: #333;
            font-weight: 600;
        }
        
        .shop-rating {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 4px 10px;
            background: #fff3cd;
            border-radius: 6px;
            font-size: 0.9em;
            color: #856404;
        }
        
        .shop-info {
            display: flex;
            gap: 15px;
            margin-bottom: 10px;
            font-size: 0.9em;
            color: #666;
        }
        
        .info-tag {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        
        .shop-recommend {
            background: #f8f9fa;
            padding: 10px;
            border-radius: 8px;
            font-size: 0.9em;
            color: #555;
            margin-bottom: 10px;
        }
        
        .shop-source {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .source-badge {
            padding: 4px 10px;
            background: #ff2442;
            color: white;
            border-radius: 4px;
            font-size: 0.8em;
        }
        
        .shop-link {
            color: #667eea;
            text-decoration: none;
            font-size: 0.9em;
        }
        
        .shop-link:hover {
            text-decoration: underline;
        }
        
        .empty-state {
            text-align: center;
            padding: 40px;
            color: #999;
        }
        
        .loading {
            text-align: center;
            padding: 30px;
            color: #667eea;
        }
        
        .footer {
            text-align: center;
            color: white;
            margin-top: 30px;
            opacity: 0.8;
            font-size: 0.9em;
        }
        
        @media (max-width: 600px) {
            .header h1 {
                font-size: 1.8em;
            }
            
            .area-btn, .sub-area-btn {
                font-size: 0.85em;
                padding: 6px 12px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>👑 外卖女王</h1>
            <p>深圳外卖推荐助手 · 每天更新</p>
        </div>
        
        <div class="location-card">
            <div class="location-title">
                📍 选择您的位置
            </div>
            <div class="area-selector" id="areaSelector">
                <!-- 区域按钮 -->
            </div>
            <div class="sub-area-selector" id="subAreaSelector">
                <!-- 子区域按钮 -->
            </div>
        </div>
        
        <div class="shops-card">
            <div class="shops-title">
                <span>🍱 今日推荐</span>
                <button class="refresh-btn" onclick="loadShops()">🔄 刷新</button>
            </div>
            <div id="shopsList">
                <div class="loading">加载中...</div>
            </div>
        </div>
        
        <div class="footer">
            <p>数据来源：小红书 | 大众点评</p>
            <p>更新时间：<span id="updateTime">-</span></p>
        </div>
    </div>
    
    <script>
        // 区域数据
        const areas = {
            "南山区": ["科技园", "海岸城", "深圳湾", "前海", "西丽", "南油", "蛇口"],
            "福田区": ["CBD", "车公庙", "华强北", "香蜜湖", "岗厦", "梅林"],
            "罗湖区": ["国贸", "东门", "万象城", "湖贝", "笋岗"],
            "宝安区": ["宝安中心", "西乡", "福永", "沙井", "新安"],
            "龙华区": ["深圳北站", "龙华中心", "民治", "观澜"],
            "龙岗区": ["大运", "龙岗中心城", "布吉", "坂田"]
        };
        
        let currentArea = '南山区';
        let currentSubArea = '科技园';
        
        // 初始化区域选择器
        function initAreaSelector() {
            const areaSelector = document.getElementById('areaSelector');
            const subAreaSelector = document.getElementById('subAreaSelector');
            
            // 主区域
            Object.keys(areas).forEach(area => {
                const btn = document.createElement('button');
                btn.className = `area-btn ${area === currentArea ? 'active' : ''}`;
                btn.textContent = area;
                btn.onclick = () => selectArea(area);
                areaSelector.appendChild(btn);
            });
            
            // 子区域
            updateSubAreas();
        }
        
        function selectArea(area) {
            currentArea = area;
            currentSubArea = areas[area][0];
            
            document.querySelectorAll('.area-btn').forEach(btn => {
                btn.classList.toggle('active', btn.textContent === area);
            });
            
            updateSubAreas();
            loadShops();
        }
        
        function updateSubAreas() {
            const subAreaSelector = document.getElementById('subAreaSelector');
            subAreaSelector.innerHTML = '';
            
            areas[currentArea].forEach(sub => {
                const btn = document.createElement('button');
                btn.className = `sub-area-btn ${sub === currentSubArea ? 'active' : ''}`;
                btn.textContent = sub;
                btn.onclick = () => selectSubArea(sub);
                subAreaSelector.appendChild(btn);
            });
        }
        
        function selectSubArea(sub) {
            currentSubArea = sub;
            
            document.querySelectorAll('.sub-area-btn').forEach(btn => {
                btn.classList.toggle('active', btn.textContent === sub);
            });
            
            loadShops();
        }
        
        // 加载店铺数据
        async function loadShops() {
            const shopsList = document.getElementById('shopsList');
            shopsList.innerHTML = '<div class="loading">🍜 正在寻找美食...</div>';
            
            try {
                const response = await fetch('data/shops.json');
                const data = await response.json();
                
                // 过滤当前区域的店铺
                const filteredShops = data.shops.filter(shop => 
                    shop.area === currentArea && shop.subArea === currentSubArea
                );
                
                if (filteredShops.length === 0) {
                    shopsList.innerHTML = `
                        <div class="empty-state">
                            <p>😋 暂无推荐</p>
                            <p>该区域暂无外卖推荐，换个区域试试吧～</p>
                        </div>
                    `;
                    return;
                }
                
                shopsList.innerHTML = filteredShops.map(shop => `
                    <div class="shop-item">
                        <div class="shop-header">
                            <div class="shop-name">${shop.name}</div>
                            <div class="shop-rating">⭐ ${shop.rating || '暂无'}</div>
                        </div>
                        <div class="shop-info">
                            <span class="info-tag">💰 ${shop.price || '未知'}</span>
                            <span class="info-tag">📍 ${shop.area}·${shop.subArea}</span>
                        </div>
                        <div class="shop-recommend">
                            🌟 推荐：${shop.recommendations.join('、')}
                        </div>
                        <div class="shop-source">
                            <span class="source-badge">${shop.source}</span>
                            <a href="${shop.link}" target="_blank" class="shop-link">查看详情 →</a>
                        </div>
                    </div>
                `).join('');
                
                document.getElementById('updateTime').textContent = new Date(data.lastUpdate).toLocaleString('zh-CN');
                
            } catch (error) {
                shopsList.innerHTML = `
                    <div class="empty-state">
                        <p>😢 加载失败</p>
                        <p>请稍后再试</p>
                    </div>
                `;
                console.error('Error loading shops:', error);
            }
        }
        
        // 初始化
        initAreaSelector();
        loadShops();
    </script>
</body>
</html>
